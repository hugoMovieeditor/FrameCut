<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="FrameCut — a 35mm filmstrip with one cut frame">
  <defs>
    <radialGradient id="fcAtmo" cx="78%" cy="-8%" r="90%">
      <stop offset="0" stop-color="#8ea0ff" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#b9a7ff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#8ea0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fcFrame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26282d"/>
      <stop offset="1" stop-color="#212327"/>
    </linearGradient>
    <linearGradient id="fcCut" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f3d"/>
      <stop offset="1" stop-color="#1d2030"/>
    </linearGradient>
    <pattern id="fcDots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- canvas -->
  <rect width="800" height="240" rx="18" fill="#17181b"/>
  <rect width="800" height="240" rx="18" fill="url(#fcDots)"/>
  <rect width="800" height="240" rx="18" fill="url(#fcAtmo)"/>

  <!-- 35mm filmstrip body -->
  <g>
    <rect x="36" y="70" width="728" height="116" rx="6" fill="#0f1012"/>
    <!-- sprocket holes top & bottom -->
    <g fill="#26282d">
      <!-- top row -->
      <rect x="52"  y="78" width="12" height="9" rx="2"/><rect x="92"  y="78" width="12" height="9" rx="2"/><rect x="132" y="78" width="12" height="9" rx="2"/><rect x="172" y="78" width="12" height="9" rx="2"/><rect x="212" y="78" width="12" height="9" rx="2"/><rect x="252" y="78" width="12" height="9" rx="2"/><rect x="292" y="78" width="12" height="9" rx="2"/><rect x="332" y="78" width="12" height="9" rx="2"/><rect x="372" y="78" width="12" height="9" rx="2"/><rect x="412" y="78" width="12" height="9" rx="2"/><rect x="452" y="78" width="12" height="9" rx="2"/><rect x="492" y="78" width="12" height="9" rx="2"/><rect x="532" y="78" width="12" height="9" rx="2"/><rect x="572" y="78" width="12" height="9" rx="2"/><rect x="612" y="78" width="12" height="9" rx="2"/><rect x="652" y="78" width="12" height="9" rx="2"/><rect x="692" y="78" width="12" height="9" rx="2"/><rect x="732" y="78" width="12" height="9" rx="2"/>
      <!-- bottom row -->
      <rect x="52"  y="169" width="12" height="9" rx="2"/><rect x="92"  y="169" width="12" height="9" rx="2"/><rect x="132" y="169" width="12" height="9" rx="2"/><rect x="172" y="169" width="12" height="9" rx="2"/><rect x="212" y="169" width="12" height="9" rx="2"/><rect x="252" y="169" width="12" height="9" rx="2"/><rect x="292" y="169" width="12" height="9" rx="2"/><rect x="332" y="169" width="12" height="9" rx="2"/><rect x="372" y="169" width="12" height="9" rx="2"/><rect x="412" y="169" width="12" height="9" rx="2"/><rect x="452" y="169" width="12" height="9" rx="2"/><rect x="492" y="169" width="12" height="9" rx="2"/><rect x="532" y="169" width="12" height="9" rx="2"/><rect x="572" y="169" width="12" height="9" rx="2"/><rect x="612" y="169" width="12" height="9" rx="2"/><rect x="652" y="169" width="12" height="9" rx="2"/><rect x="692" y="169" width="12" height="9" rx="2"/><rect x="732" y="169" width="12" height="9" rx="2"/>
    </g>

    <!-- frames: 5 dim + 1 highlighted (the cut) -->
    <g>
      <rect x="56"  y="94" width="104" height="58" rx="4" fill="url(#fcFrame)" stroke="#34373d" stroke-width="1"/>
      <rect x="170" y="94" width="104" height="58" rx="4" fill="url(#fcFrame)" stroke="#34373d" stroke-width="1"/>
      <!-- THE CUT FRAME -->
      <rect x="284" y="90" width="104" height="66" rx="4" fill="url(#fcCut)" stroke="#8ea0ff" stroke-width="2"/>
      <rect x="284" y="90" width="104" height="66" rx="4" fill="none" stroke="#8ea0ff" stroke-opacity="0.25" stroke-width="6"/>
      <!-- scissors-cut mark on the cut frame -->
      <path d="M336 92 L336 154" stroke="#b9a7ff" stroke-width="1" stroke-dasharray="3 3" opacity="0.55"/>
      <circle cx="336" cy="123" r="13" fill="none" stroke="#8ea0ff" stroke-width="1.6"/>
      <path d="M330 123 L342 123 M336 117 L336 129" stroke="#8ea0ff" stroke-width="1.6"/>
      <rect x="402" y="94" width="104" height="58" rx="4" fill="url(#fcFrame)" stroke="#34373d" stroke-width="1"/>
      <rect x="516" y="94" width="104" height="58" rx="4" fill="url(#fcFrame)" stroke="#34373d" stroke-width="1"/>
      <rect x="630" y="94" width="104" height="58" rx="4" fill="url(#fcFrame)" stroke="#34373d" stroke-width="1"/>
    </g>
  </g>

  <!-- REC chip + wordmark -->
  <g font-family="ui-monospace,'SFMono-Regular',Menlo,monospace">
    <circle cx="48" cy="40" r="5" fill="#ff7a6b"/>
    <text x="62" y="44" font-size="12" letter-spacing="3" fill="#7c8088">REC · ROLL 01</text>
    <text x="600" y="44" font-size="12" letter-spacing="2" fill="#7c8088">ARC · 5042002</text>
  </g>
  <text x="36" y="222" font-family="-apple-system,'Segoe UI',sans-serif" font-size="38" font-weight="400" letter-spacing="-1" fill="#f4f5f6">FrameCut<tspan font-size="14" font-family="ui-monospace,monospace" letter-spacing="2" fill="#7c8088" dx="14">cut one frame. own the still.</tspan></text>

  <!-- timecode tag over the cut frame -->
  <g transform="translate(284,62)">
    <rect x="0" y="0" width="104" height="22" rx="5" fill="#212327" stroke="#8ea0ff" stroke-opacity="0.5"/>
    <circle cx="12" cy="11" r="3" fill="#8ea0ff"/>
    <text x="22" y="15" font-family="ui-monospace,monospace" font-size="12" letter-spacing="1.5" fill="#b9bcc2">00:01:23:04</text>
  </g>

  <rect x="0.5" y="0.5" width="799" height="239" rx="18" fill="none" stroke="#34373d" stroke-width="1"/>
</svg>
